<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te amo ♥️</title>

<style>
body{
    margin:0;
    padding:0;
    background: linear-gradient(180deg,#000000,#1a1a1a);
    font-family: Arial, Helvetica, sans-serif;
    overflow:hidden;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* Fundo de fotos */
.galeria{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:15px;
    z-index:1;
    opacity:0.18;
}

.galeria img{
    width:80%;
    max-width:320px;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

/* Caixa central */
.container{
    position:relative;
    z-index:3;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,77,109,0.2);
    max-width:320px;
}

/* Texto digitando */
#mensagem{
    font-size:22px;
    min-height:60px;
    margin-bottom:20px;
    border-right:2px solid #ff4d6d;
    white-space:nowrap;
    overflow:hidden;
}

/* Botão */
button{
    background:#ff4d6d;
    border:none;
    padding:12px 20px;
    border-radius:30px;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 15px #ff4d6d;
}

/* Declaração escondida */
#declaracao{
    margin-top:20px;
    display:none;
    font-size:15px;
    line-height:1.5;
}

/* Chuva de texto */
.chuva{
    position:fixed;
    top:-50px;
    font-size:20px;
    color:#ff4d6d;
    animation: cair linear forwards;
    white-space:nowrap;
    z-index:2;
}

@keyframes cair{
    0%{ transform: translateY(0); opacity:1; }
    100%{ transform: translateY(110vh); opacity:0; }
}

/* Corações flutuando */
.coracao{
    position:fixed;
    bottom:-20px;
    color:#ff4d6d;
    font-size:20px;
    animation: subir 6s linear forwards;
    z-index:2;
}

@keyframes subir{
    0%{ transform:translateY(0); opacity:1; }
    100%{ transform:translateY(-110vh); opacity:0; }
}
</style>
</head>

<body>

<!-- Galeria -->
<div class="galeria">
  <div class="track">
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">

    <!-- duplicadas para efeito infinito -->
    <img src="foto1.jpg">
    <img src="foto2.jpg">
    <img src="foto3.jpg">
    <img src="foto4.jpg">
  </div>
</div>

<!-- Conteúdo central -->
<div class="container">
    <div id="mensagem"></div>

    <button onclick="mostrarDeclaracao()">Clique aqui ❤️</button>

    <div id="declaracao">
        Desde que você entrou na minha vida, tudo ficou mais bonito.<br>
        Cada momento ao seu lado é especial e único.<br><br>
        Você é meu presente, meu sorriso diário e meu amor eterno. 💖
    </div>
</div>

<!-- Música (opcional) -->
<audio autoplay loop>
    <source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* TEXTO DIGITANDO */
const texto = "Eu te amo para sempre ❤️";
let i = 0;

function digitar(){
    if(i < texto.length){
        document.getElementById("mensagem").innerHTML += texto.charAt(i);
        i++;
        setTimeout(digitar, 80);
    }
}
digitar();

/* MOSTRAR DECLARAÇÃO */
function mostrarDeclaracao(){
    document.getElementById("declaracao").style.display = "block";
}

/* CHUVA DE TE AMO */
function criarChuva(){
    const texto = document.createElement("div");
    texto.classList.add("chuva");
    texto.innerHTML = "Te amo ♥️";

    texto.style.left = Math.random() * 100 + "vw";
    texto.style.animationDuration = (Math.random() * 3 + 3) + "s";
    texto.style.fontSize = (Math.random() * 15 + 15) + "px";

    document.body.appendChild(texto);

    setTimeout(()=>{ texto.remove(); },6000);
}
setInterval(criarChuva,200);

/* CORAÇÕES SUBINDO */
function criarCoracao(){
    const coracao = document.createElement("div");
    coracao.classList.add("coracao");
    coracao.innerHTML = "❤️";

    coracao.style.left = Math.random() * 100 + "vw";
    coracao.style.animationDuration = (Math.random() * 3 + 4) + "s";
    coracao.style.fontSize = (Math.random() * 10 + 15) + "px";

    document.body.appendChild(coracao);

    setTimeout(()=>{ coracao.remove(); },7000);
}
setInterval(criarCoracao,500);

</script>

</body>
</html>
